<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Calculadora</title>
    <style>
        :root { --bg-android: #000; --text-main: #e5e3e1; --btn-num: #1c1d1f; --accent-blue: #004a77; --magic-glow: #919191; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: none; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-android); font-family: 'Roboto', sans-serif; position: fixed; }
        #magic-line { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 2px; background-color: var(--magic-glow); z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .secret-zone { position: absolute; top: 0; width: 60px; height: 60px; z-index: 1000; }
        #config-btn { left: 0; }
        #exit-btn { right: 0; }
        .app-container { height: 100%; width: 100%; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .display { flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; padding: 15px 25px; min-height: 120px; }
        #screen { font-size: 88px; font-weight: 300; color: var(--text-main); text-align: right; white-space: nowrap; line-height: 1; transition: font-size 0.15s ease; }
        .numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 15px calc(env(safe-area-inset-bottom) + 35px) 15px; width: 100%; max-width: 500px; margin: 0 auto; background: var(--bg-android); }
        button { border: none; border-radius: 16px; height: 17vw; max-height: 75px; font-size: 26px; background-color: var(--btn-num); color: var(--text-main); display: flex; align-items: center; justify-content: center; }
        .btn-top { color: #8ab4f8; font-weight: bold; font-size: 22px; }
        .btn-equal { background-color: var(--accent-blue) !important; color: white !important; grid-row: span 2; height: auto; max-height: 150px; font-size: 32px; border-radius: 28px; }
        button:active { filter: brightness(1.4); }
    </style>
</head>
<body>
    <div id="magic-line"></div>
    <div id="config-btn" class="secret-zone" onclick="abrirConfig()"></div>
    <div id="exit-btn" class="secret-zone" onclick="window.location.assign('index.html')"></div>

    <div class="app-container">
        <div class="display"><div id="screen">0</div></div>
        <div class="numpad">
            <button onclick="mem('MC')">MC</button><button onclick="mem('M+')">M+</button><button onclick="mem('M-')">M-</button><button onclick="mem('MR')">MR</button>
            <button class="btn-top" onclick="reset()">C</button><button class="btn-top" onclick="op('/')">÷</button><button class="btn-top" onclick="op('*')">×</button><button class="btn-top" onclick="del()">⌫</button>
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button class="btn-top" onclick="op('-')">−</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button class="btn-top" onclick="op('+')">+</button>
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button class="btn-equal" onclick="calc()">=</button>
            <button onclick="magic()">%</button><button onclick="press('0')">0</button><button onclick="press('.')">,</button>
        </div>
    </div>

<script>
    let cur = "", pre = "", oper = null, n1 = 0, n2 = 0, magicMode = false, step = 0, diffArr = [], diffIdx = 0, mClicks = 0, mTimer = null, isForcing = false, memoria = 0;
    const screenEl = document.getElementById('screen');
    const magicLine = document.getElementById('magic-line');

function getForcedValue() {
        let val = localStorage.getItem('activeForce') || "0";
        if (val.toLowerCase() === "fecha" || val.toLowerCase() === "todo") {
            let now = new Date();
            let d = String(now.getDate()).padStart(2, '0');
            let m = String(now.getMonth() + 1).padStart(2, '0');
            let fullYear = String(now.getFullYear()); // "2026"
            
            if (val.toLowerCase() === "fecha") {
                // Mantiene el año completo
                return d + m + fullYear;
            } else {
                // Modo "todo": Año corto (26) + Hora 12h
                let shortYear = fullYear.slice(-2); 
                let hrs12 = now.getHours() % 12 || 12;
                let h = String(hrs12).padStart(2, '0');
                let min = String(now.getMinutes()).padStart(2, '0');
                return d + m + shortYear + h + min;
            }
        }
        return val;
    }

    function ajustarTamanoFuente(t) {
        const l = t.length;
        screenEl.style.fontSize = (l > 13 ? 35 : l > 10 ? 45 : l > 8 ? 55 : l > 6 ? 70 : 88) + "px";
    }

    function updateDisplay(val) {
        let f = (magicMode && step === 2 && (val === "0" || val === "")) ? "" : (val || "0");
        ajustarTamanoFuente(f); screenEl.innerText = f;
    }

    function press(v) {
            if (magicMode && step === 2) {
                if (diffIdx < diffArr.length) {
                    if (diffIdx === 0) cur = "";
                    let nextChar = diffArr[diffIdx];
                    
                    // Saltar cero inicial si no es 0.xxx
                    if (diffIdx === 0 && nextChar === "0" && diffArr[diffIdx + 1] !== '.') {
                        diffIdx++; 
                        nextChar = diffArr[diffIdx];
                    }
                    
                    cur += nextChar; 
                    diffIdx++;
                    
                    // Si el siguiente es un punto, lo inyectamos automáticamente
                    if (diffArr[diffIdx] === '.') { 
                        cur += '.'; 
                        diffIdx++; 
                    }
                }
            } else {
                if (cur === "0" && v !== ".") cur = v;
                else cur = (cur === "0" && v === ".") ? "0." : (cur === "" ? v : cur + v);
            }
            updateDisplay(cur);
        }

function op(o) {
        if (isForcing) return; // Bloqueo de seguridad
        
        if (magicMode) {
            step++;
            if (step === 1) { 
                n1 = parseFloat(cur || 0); 
                cur = ""; 
                updateDisplay(""); 
            }
            else if (step === 2) {
                n2 = parseFloat(cur || 0); 
                isForcing = true; // Activamos bloqueo total
                
                let target = Number(getForcedValue());
                let diff;

                if (o === '*' || o === '×') {
                    // TU FÓRMULA: X = Objetivo / (N1 + N2)
                    let divisor = n1 + n2;
                    diff = (divisor === 0) ? target : target / divisor;
                } else {
                    // FÓRMULA SUMA: X = Objetivo - N1 - N2
                    diff = target - n1 - n2;
                }

                // Convertimos a array de caracteres con precisión de 6 decimales
                diffArr = parseFloat(Number(diff).toFixed(6)).toString().split('');
                diffIdx = 0; 
                cur = ""; 
                updateDisplay("");
            }
        } else { 
            oper = o; 
            pre = cur; 
            cur = ""; 
            updateDisplay(""); 
        }
    }

    function calc() {
        if (magicMode && step >= 2) {
            let res = getForcedValue();
            if (res.startsWith('0') && !res.includes('.')) res = res.substring(1); // Limpia cero final
            cur = res; magicMode = false; step = 0; isForcing = false;
            if (magicLine) magicLine.style.opacity = "0";
        } else {
            try { cur = eval(pre + oper.replace('×', '*').replace('÷', '/') + (cur || "0")).toString(); } catch(e) { cur = "0"; }
        }
        updateDisplay(cur); pre = ""; oper = null;
    }




    function del() {
         if (!isForcing) { cur = cur.slice(0, -1);
             updateDisplay(cur); } 
        }


    function abrirConfig() { let v = prompt("¿Qué quieres forzar?:", localStorage.getItem('activeForce') || ""); if(v !== null) localStorage.setItem('activeForce', v); }

        function reset() { 
        if (isForcing) return; // Bloqueo
        cur = ""; pre = ""; oper = null; magicMode = false; step = 0; isForcing = false; 
        if (magicLine) magicLine.style.opacity = "0"; 
        updateDisplay("0"); 
    }

    function magic() {
        if (isForcing) return; // Bloqueo
        mClicks++; 
        clearTimeout(mTimer); 
        mTimer = setTimeout(() => { mClicks = 0; }, 800);
        if (mClicks === 2) {
            magicMode = true; step = 0; isForcing = false;
            if (magicLine) magicLine.style.opacity = "0.6";
            if (navigator.vibrate) navigator.vibrate([60, 50, 60]);
            mClicks = 0;
        }
    }

    function mem(t) { 
        if (isForcing) return; // Bloqueo ya existente en tu código, asegurar que se mantenga
        let n = parseFloat(cur || 0); 
        if(t=='MC') memoria=0; 
        else if(t=='M+') memoria+=n; 
        else if(t=='M-') memoria-=n; 
        else if(t=='MR') cur=memoria.toString(); 
        updateDisplay(cur); 
    }
</script>
</body>
</html>
